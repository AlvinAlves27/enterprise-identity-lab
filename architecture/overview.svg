  <text x="425" y="280" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Key Accomplishments</text>
  
  <!-- Column positions: Col1 starts at 50, Col2 at 310, Col3 at 570 -->
  <!-- Each column width ~250px, box padding 20px each side -->
  
  <!-- Row 1 -->
  <text x="50" y="310" fill="#22c55e" font-family="Segoe UI, Arial, sans-serif" font-size="13">✓</text>
  <text x="68" y="310" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="10">Built hybrid identity infrastructure from scratch</text>
  
  <text x="310" y="310" fill="#22c55e" font-family="Segoe UI, Arial, sans-serif" font-size="13">✓</text>
  <text x="328" y="310" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="10">Configured SAML 2.0 federation with Salesforce</text>
  
  <text x="570" y="310" fill="#22c55e" font-family="Segoe UI, Arial, sans-serif" font-size="13">✓</text>
  <text x="588" y="310" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="10">Implemented enterprise-grade SSO</text>
  
  <!-- Row 2 -->
  <text x="50" y="335" fill="#22c55e" font-family="Segoe UI, Arial, sans-serif" font-size="13">✓</text>
  <text x="68" y="335" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="10">Established directory synchronization (AD → Cloud)</text>
  
  <text x="310" y="335" fill="#22c55e" font-family="Segoe UI, Arial, sans-serif" font-size="13">✓</text>
  <text x="328" y="335" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="10">Demonstrated troubleshooting &amp; problem-solving</text>
  
  <text x="570" y="335" fill="#22c55e" font-family="Segoe UI, Arial, sans-serif" font-size="13">✓</text>
  <text x="588" y="335" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="10">Applied zero-trust security principles</text>
  
  <!-- Row 3 -->
  <text x="50" y="360" fill="#22c55e" font-family="Segoe UI, Arial, sans-serif" font-size="13">✓</text>
  <text x="68" y="360" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="10">Certificate-based trust establishment</text>
  
  <text x="310" y="360" fill="#22c55e" font-family="Segoe UI, Arial, sans-serif" font-size="13">✓</text>
  <text x="328" y="360" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="10">User provisioning &amp; attribute mapping</text>
  
  <text x="570" y="360" fill="#22c55e" font-family="Segoe UI, Arial, sans-serif" font-size="13">✓</text>
  <text x="588" y="360" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="10">Hybrid device registration</text>
  
  <!-- Footer - NO DATE -->
  <text x="425" y="408" text-anchor="middle" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="10">Enterprise Identity Lab | Alvin Alves</text>
</svg>
