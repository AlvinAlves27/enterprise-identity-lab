<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 420" width="850" height="420">
  <!-- Background -->
  <rect width="850" height="420" fill="#0f172a"/>
  
  <!-- Definitions -->
  <defs>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Title -->
  <text x="425" y="35" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="bold">Skills &amp; Technologies Mastered</text>
  <text x="425" y="58" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="12">Enterprise Identity Lab Portfolio</text>
  
  <!-- Directory Services Card -->
  <g filter="url(#shadow3)">
    <rect x="30" y="80" width="185" height="145" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
    <text x="122" y="108" text-anchor="middle" fill="#6ee7b7" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">🗂️ Directory Services</text>
    <line x1="50" y1="120" x2="195" y2="120" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <text x="122" y="143" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">Active Directory</text>
    <text x="122" y="163" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">Microsoft Entra ID</text>
    <text x="122" y="183" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">DNS Management</text>
    <text x="122" y="203" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">Group Policy</text>
  </g>
  
  <!-- Synchronization Card -->
  <g filter="url(#shadow3)">
    <rect x="235" y="80" width="185" height="145" rx="10" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="2"/>
    <text x="327" y="108" text-anchor="middle" fill="#7dd3fc" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">🔄 Synchronization</text>
    <line x1="255" y1="120" x2="400" y2="120" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
    <text x="327" y="143" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">Entra Connect</text>
    <text x="327" y="163" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">Password Hash Sync</text>
    <text x="327" y="183" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">Delta Sync</text>
    <text x="327" y="203" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">UPN Configuration</text>
  </g>
  
  <!-- Authentication Card -->
  <g filter="url(#shadow3)">
    <rect x="440" y="80" width="185" height="145" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
    <text x="532" y="108" text-anchor="middle" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">🔐 Authentication</text>
    <line x1="460" y1="120" x2="605" y2="120" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
    <text x="532" y="143" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">SAML 2.0 SSO</text>
    <text x="532" y="163" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">Multi-Factor Auth</text>
    <text x="532" y="183" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">Federation Trust</text>
    <text x="532" y="203" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">Certificate Mgmt</text>
  </g>
  
  <!-- Cloud Platforms Card -->
  <g filter="url(#shadow3)">
    <rect x="645" y="80" width="175" height="145" rx="10" fill="#5b21b6" stroke="#a78bfa" stroke-width="2"/>
