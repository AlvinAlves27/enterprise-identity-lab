    <text x="732" y="143" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">Microsoft Azure</text>
    <text x="732" y="163" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">Salesforce</text>
    <text x="732" y="183" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">Azure VMs</text>
    <text x="732" y="203" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="11">Enterprise Apps</text>
  </g>
  
  <!-- Key Accomplishments Box -->
