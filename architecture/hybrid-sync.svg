<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 480" width="850" height="480">
  <!-- Background -->
  <rect width="850" height="480" fill="#0f172a"/>
  
  <!-- Definitions -->
  <defs>
    <linearGradient id="onpremGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="cloudGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrBlue2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Title -->
  <text x="425" y="35" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="bold">Hybrid Identity Synchronization</text>
  <text x="425" y="58" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="12">Active Directory → Entra Connect → Microsoft Entra ID</text>
  
  <!-- On-Premises Section -->
  <g filter="url(#shadow2)">
    <rect x="30" y="85" width="230" height="290" rx="12" fill="url(#onpremGrad2)" stroke="#10b981" stroke-width="2"/>
    <text x="145" y="115" text-anchor="middle" fill="#6ee7b7" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">🏢 On-Premises</text>
    
    <!-- Active Directory -->
    <rect x="50" y="135" width="190" height="85" rx="8" fill="#022c22"/>
    <text x="145" y="162" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">Active Directory</text>
    <text x="145" y="182" text-anchor="middle" fill="#a7f3d0" font-family="Segoe UI, Arial, sans-serif" font-size="11">zerotrustlabs.local</text>
    <text x="145" y="205" text-anchor="middle" fill="#6ee7b7" font-family="Segoe UI, Arial, sans-serif" font-size="10">• rootadmin1</text>
    
    <!-- AD Users -->
    <rect x="50" y="235" width="190" height="55" rx="8" fill="#022c22"/>
    <text x="145" y="260" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500">AD Users</text>
    <text x="145" y="280" text-anchor="middle" fill="#6ee7b7" font-family="Segoe UI, Arial, sans-serif" font-size="10">UPN: @zerotrustlabs.it.com</text>
    
    <!-- Domain Controller -->
    <rect x="50" y="305" width="190" height="50" rx="8" fill="#022c22"/>
    <text x="145" y="335" text-anchor="middle" fill="#a7f3d0" font-family="Segoe UI, Arial, sans-serif" font-size="11">Domain Controller VM</text>
  </g>
  
  <!-- Entra Connect - Center -->
  <g filter="url(#shadow2)">
    <rect x="310" y="130" width="230" height="170" rx="12" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="2"/>
    <text x="425" y="162" text-anchor="middle" fill="#7dd3fc" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">🔄 Microsoft Entra Connect</text>
    
    <!-- Sync Details Box -->
    <rect x="330" y="180" width="190" height="105" rx="6" fill="#082f49"/>
    <text x="425" y="205" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500">Sync Configuration</text>
    <text x="425" y="230" text-anchor="middle" fill="#7dd3fc" font-family="Segoe UI, Arial, sans-serif" font-size="11">• Password Hash Sync ✓</text>
    <text x="425" y="252" text-anchor="middle" fill="#7dd3fc" font-family="Segoe UI, Arial, sans-serif" font-size="11">• Delta Sync: 30 min</text>
    <text x="425" y="274" text-anchor="middle" fill="#7dd3fc" font-family="Segoe UI, Arial, sans-serif" font-size="11">• Express Settings</text>
  </g>
  
  <!-- Cloud Section -->
  <g filter="url(#shadow2)">
    <rect x="590" y="85" width="230" height="290" rx="12" fill="url(#cloudGrad2)" stroke="#3b82f6" stroke-width="2"/>
    <text x="705" y="115" text-anchor="middle" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">☁️ Microsoft Entra ID</text>
    
    <!-- Tenant -->
    <rect x="610" y="135" width="190" height="50" rx="8" fill="#172554"/>
    <text x="705" y="158" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500">Tenant</text>
    <text x="705" y="176" text-anchor="middle" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="11">zerotrustlabs.it.com</text>
    
    <!-- Synced Users -->
    <rect x="610" y="200" width="190" height="80" rx="8" fill="#172554"/>
    <text x="705" y="225" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500">Synced Users</text>
    <text x="705" y="248" text-anchor="middle" fill="#22c55e" font-family="Segoe UI, Arial, sans-serif" font-size="10">• rootadmin1 (Sync: Yes)</text>
    <text x="705" y="268" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="10">• entrauser1 (Cloud-only)</text>
    
    <!-- Sync Status -->
    <rect x="610" y="295" width="190" height="60" rx="8" fill="#172554"/>
    <text x="705" y="320" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500">Sync Status</text>
    <text x="705" y="343" text-anchor="middle" fill="#22c55e" font-family="Segoe UI, Arial, sans-serif" font-size="12">✓ Healthy</text>
  </g>
  
  <!-- Arrows -->
  <!-- AD to Entra Connect -->
  <path d="M 260 200 L 310 200" fill="none" stroke="#10b981" stroke-width="3" marker-end="url(#arrGreen)"/>
  <rect x="262" y="178" width="45" height="16" rx="4" fill="#065f46"/>
  <text x="284" y="190" text-anchor="middle" fill="#6ee7b7" font-family="Segoe UI, Arial, sans-serif" font-size="9">Read</text>
  
  <!-- Entra Connect to Cloud -->
  <path d="M 540 215 L 590 215" fill="none" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrBlue2)"/>
  <rect x="542" y="193" width="45" height="16" rx="4" fill="#1e3a8a"/>
  <text x="564" y="205" text-anchor="middle" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="9">Write</text>
  
  <!-- Sync Process Legend -->
  <rect x="175" y="400" width="500" height="55" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="425" y="423" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Password Hash Synchronization Process</text>
  <text x="425" y="445" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="11">AD Password → MD4 Hash → SHA256 Transform → Entra ID (Every 2 minutes)</text>
  
  <!-- Footer -->
  <text x="425" y="475" text-anchor="middle" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="10">Enterprise Identity Lab | Hybrid Identity Architecture | Alvin Alves</text>
</svg>
